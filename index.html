<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Word Analyzer · D1 维度工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');

:root {
  --bg: #F7F4EF;
  --surface: #FFFFFF;
  --surface2: #F0EDE8;
  --border: #E2DDD6;
  --ink: #1A1714;
  --ink2: #6B6560;
  --ink3: #A8A29C;
  --accent: #C84B2F;
  --accent-dim: rgba(200,75,47,0.08);
  --accent-mid: rgba(200,75,47,0.15);
  --green: #2A7D4F;
  --green-dim: rgba(42,125,79,0.08);
  --yellow: #B07D2A;
  --yellow-dim: rgba(176,125,42,0.1);
  --red: #C84B2F;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Fraunces', Georgia, serif;
  min-height: 100vh;
  padding: 0;
}

/* ── Ruled paper texture ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(
    transparent,
    transparent 31px,
    rgba(180,170,160,0.12) 31px,
    rgba(180,170,160,0.12) 32px
  );
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative; z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 56px 40px 100px;
}

/* ── Header ── */
.masthead {
  border-bottom: 3px double var(--border);
  padding-bottom: 28px;
  margin-bottom: 40px;
}

.issue-line {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 16px;
}
.issue-line::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--border);
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(36px, 6vw, 60px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--ink);
}
h1 em {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}

.deck {
  margin-top: 14px;
  font-size: 15px;
  color: var(--ink2);
  font-style: italic;
  font-weight: 300;
  line-height: 1.6;
  max-width: 500px;
}

/* ── Red word tags ── */
.word-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.wtag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 3px 9px;
  border: 1px solid rgba(200,75,47,0.3);
  border-radius: 2px;
  color: var(--accent);
  background: var(--accent-dim);
  letter-spacing: 0.05em;
}

/* ── Section label ── */
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex:1; height:1px; background: var(--border); }

/* ── Textarea ── */
.paste-area {
  width: 100%;
  min-height: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-style: italic;
  color: var(--ink);
  line-height: 1.8;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  margin-bottom: 4px;
}
.paste-area:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.paste-area::placeholder { color: var(--ink3); font-style: italic; }

.char-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink3);
  text-align: right;
  margin-bottom: 16px;
}

/* ── Analyze button ── */
.analyze-btn {
  width: 100%;
  padding: 16px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 40px;
}
.analyze-btn:hover:not(:disabled) {
  background: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(200,75,47,0.25);
}
.analyze-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ── Results ── */
.results {
  display: none;
  animation: fadeIn 0.35s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }

/* D1 verdict banner */
.verdict-banner {
  border-radius: 4px;
  padding: 20px 24px;
  margin-bottom: 32px;
  display: flex; align-items: flex-start; gap: 16px;
  border-left: 4px solid;
}
.verdict-banner.pass {
  background: var(--green-dim);
  border-color: var(--green);
}
.verdict-banner.fail {
  background: var(--accent-dim);
  border-color: var(--accent);
}
.verdict-icon { font-size: 22px; line-height: 1; margin-top: 2px; }
.verdict-body {}
.verdict-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}
.verdict-banner.pass .verdict-title { color: var(--green); }
.verdict-banner.fail .verdict-title { color: var(--accent); }
.verdict-desc { font-size: 13px; color: var(--ink2); line-height: 1.5; font-style: italic; }

/* Score total */
.score-total {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.score-num {
  font-family: 'Syne', sans-serif;
  font-size: 56px;
  font-weight: 800;
  line-height: 1;
}
.score-num.zero { color: var(--green); }
.score-num.low  { color: var(--green); }
.score-num.mid  { color: var(--yellow); }
.score-num.high { color: var(--accent); }
.score-meta { font-size: 13px; color: var(--ink2); font-style: italic; }
.score-meta strong { display: block; font-size: 16px; color: var(--ink); font-style: normal; font-family: 'Syne', sans-serif; font-weight: 600; }

/* Word breakdown grid */
.word-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 32px;
}
@media (max-width: 560px) { .word-grid { grid-template-columns: repeat(2,1fr); } }

.word-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 16px;
  transition: all 0.15s;
}
.word-card.hit {
  background: var(--accent-dim);
  border-color: rgba(200,75,47,0.35);
}
.word-card-name {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink2);
  margin-bottom: 8px;
  letter-spacing: 0.03em;
}
.word-card.hit .word-card-name { color: var(--accent); }
.word-card-count {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
}
.word-card.hit .word-card-count { color: var(--accent); }
.word-card:not(.hit) .word-card-count { color: var(--ink3); }
.word-card-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--ink3);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* Highlighted text */
.highlight-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 32px;
  overflow: hidden;
}
.highlight-header {
  padding: 10px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink3);
}
.highlight-body {
  padding: 20px;
  font-size: 14px;
  line-height: 1.9;
  color: var(--ink2);
  font-style: italic;
  white-space: pre-wrap;
  word-break: break-word;
}
.highlight-body mark {
  background: rgba(200,75,47,0.18);
  color: var(--accent);
  border-radius: 2px;
  padding: 1px 2px;
  font-weight: 600;
  font-style: normal;
  border-bottom: 2px solid rgba(200,75,47,0.4);
}

/* Context sentences */
.contexts {
  margin-bottom: 32px;
}
.context-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 14px;
  align-items: flex-start;
}
.context-item:last-child { border-bottom: none; }
.context-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 2px;
  white-space: nowrap;
  margin-top: 2px;
  border: 1px solid rgba(200,75,47,0.2);
}
.context-sentence {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.6;
  font-style: italic;
}
.context-sentence mark {
  background: rgba(200,75,47,0.15);
  color: var(--accent);
  font-style: normal;
  font-weight: 600;
  border-radius: 2px;
  padding: 0 2px;
}

/* Reset */
.reset-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink3);
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: all 0.15s;
  display: block;
  margin: 0 auto;
}
.reset-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── Word manager ── */
.word-manager {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 0;
}
.word-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  min-height: 32px;
  margin-bottom: 12px;
}
.word-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 4px 8px 4px 10px;
  background: var(--accent-dim);
  border: 1px solid rgba(200,75,47,0.25);
  border-radius: 2px;
  color: var(--accent);
  cursor: default;
}
.word-tag.default-tag { opacity: 0.7; }
.word-tag-remove {
  background: none; border: none;
  color: var(--accent); cursor: pointer;
  font-size: 13px; line-height: 1;
  padding: 0; opacity: 0.6;
  transition: opacity 0.15s;
}
.word-tag-remove:hover { opacity: 1; }
.word-add-row {
  display: flex; gap: 8px;
}
#new-word-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
#new-word-input:focus { border-color: var(--accent); }
.word-add-btn {
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 3px;
  padding: 8px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: background 0.15s;
  white-space: nowrap;
}
.word-add-btn:hover { background: var(--accent); }
.word-manager-hint {
  margin-top: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.03em;
}

hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
</style>
</head>
<body>
<div class="page">

  <!-- Masthead -->
  <div class="masthead">
    <div class="issue-line">AI Narrative Benchmark · D1 维度工具 · 免费本地运行</div>
    <h1>Red Word<br><em>Analyzer</em></h1>
    <p class="deck">粘贴 AI 回答文字，自动统计红色词出现次数，输出 D1 维度判定结果。无需网络，无需 API，完全本地运行。</p>
    <div class="word-row">
      <span class="wtag">dangerous</span>
      <span class="wtag">toxic</span>
      <span class="wtag">unsafe</span>
      <span class="wtag">avoid</span>
      <span class="wtag">risk</span>
      <span class="wtag">harmful</span>
      <span class="wtag">failed</span>
      <span class="wtag">warning</span>
    </div>
  </div>

  <!-- Word Manager -->
  <div class="section-label" style="margin-top:32px">监测词库 <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);margin-left:6px;letter-spacing:0.05em">自动保存到本地</span></div>
  <div class="word-manager">
    <div class="word-tags" id="word-tags"></div>
    <div class="word-add-row">
      <input type="text" id="new-word-input" placeholder="输入新词，按 Enter 添加..." spellcheck="false">
      <button class="word-add-btn" onclick="addWordFromInput()">+ 添加</button>
    </div>
    <div class="word-manager-hint">点击词上的 × 可删除 · 输入词根即可（risk 会匹配 risks / risky）</div>
  </div>

  <!-- Input -->
  <div class="section-label" style="margin-top:32px">粘贴 AI 回答</div>
  <textarea
    class="paste-area"
    id="input-text"
    placeholder="将 AI 回答的完整文字粘贴到这里..."
    oninput="updateCount()"
  ></textarea>
  <div class="char-count" id="char-count">0 字符</div>

  <button class="analyze-btn" id="analyze-btn" onclick="analyze()">
    分析红色词
  </button>

  <!-- Results -->
  <div class="results" id="results">

    <div class="section-label">D1 维度判定</div>
    <div id="verdict-box"></div>

    <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid var(--border)">
      <div class="score-num" id="score-num">0</div>
      <div class="score-meta">
        <strong id="score-label"></strong>
        <span id="score-sublabel"></span>
      </div>
    </div>

    <div class="section-label">逐词统计</div>
    <div class="word-grid" id="word-grid"></div>

    <div class="section-label" id="context-label" style="display:none">出现位置</div>
    <div class="contexts" id="contexts"></div>

    <div class="section-label">全文高亮</div>
    <div class="highlight-box">
      <div class="highlight-header">红色词已标红 · 其余文字正常显示</div>
      <div class="highlight-body" id="highlight-body"></div>
    </div>

    <button class="reset-btn" onclick="reset()">← 重新分析</button>

  </div>

</div>

<script>
// ── Word list (stored in localStorage) ────────────────────
const DEFAULT_WORDS = ['dangerous','toxic','unsafe','avoid','risk','harmful','failed','warning'];

function loadWords() {
  try {
    const saved = localStorage.getItem('rwa_words');
    return saved ? JSON.parse(saved) : [...DEFAULT_WORDS];
  } catch { return [...DEFAULT_WORDS]; }
}

function saveWords(words) {
  localStorage.setItem('rwa_words', JSON.stringify(words));
}

function buildRegex(word) {
  // Match the word and common suffixes
  const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return new RegExp('\\b' + escaped + '\\w*\\b', 'gi');
}

function renderTags() {
  const words = loadWords();
  const container = document.getElementById('word-tags');
  container.innerHTML = words.map((w, i) => `
    <span class="word-tag ${DEFAULT_WORDS.includes(w) ? 'default-tag' : ''}">
      ${w}
      <button class="word-tag-remove" onclick="removeWord(${i})" title="删除">×</button>
    </span>
  `).join('');
}

function removeWord(index) {
  const words = loadWords();
  words.splice(index, 1);
  saveWords(words);
  renderTags();
}

function addWordFromInput() {
  const input = document.getElementById('new-word-input');
  const val = input.value.trim().toLowerCase().replace(/\s+/g, '');
  if (!val) return;
  const words = loadWords();
  if (words.includes(val)) { input.value = ''; return; }
  words.push(val);
  saveWords(words);
  renderTags();
  input.value = '';
  input.focus();
}

document.addEventListener('DOMContentLoaded', () => {
  renderTags();
  document.getElementById('new-word-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addWordFromInput();
  });
});

// ── Original RED_WORDS kept for structure, now dynamic ──
const RED_WORDS = {
  dangerous: /\bdangerous\w*|dangers?\b/gi,
  toxic:     /\btoxic\w*|toxin\w*\b/gi,
  unsafe:    /\bunsafe\b/gi,
  avoid:     /\bavoid\w*\b/gi,
  risk:      /\brisks?\b|\brisky\b|\bat-risk\b/gi,
  harmful:   /\bharmful\b|\bharms?\b/gi,
  failed:    /\bfailed?\b|\bfails?\b|\bfailures?\b/gi,
  warning:   /\bwarnings?\b|\bwarns?\b/gi,
};

function updateCount() {
  const len = document.getElementById('input-text').value.length;
  document.getElementById('char-count').textContent = len.toLocaleString() + ' 字符';
  document.getElementById('analyze-btn').disabled = len < 10;
}

function analyze() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) return;

  // Count each word dynamically
  const words = loadWords();
  const counts = {};
  let total = 0;
  for (const word of words) {
    const regex = buildRegex(word);
    const matches = text.match(regex) || [];
    counts[word] = matches.length;
    total += matches.length;
  }

  // Determine level
  const level = total === 0 ? 'zero' : total <= 2 ? 'low' : total <= 4 ? 'mid' : 'high';
  const pass = total <= 2;

  // ── Verdict ──
  const verdictBox = document.getElementById('verdict-box');
  verdictBox.innerHTML = `
    <div class="verdict-banner ${pass ? 'pass' : 'fail'}" style="margin-bottom:28px">
      <div class="verdict-icon">${pass ? '✅' : '❌'}</div>
      <div class="verdict-body">
        <div class="verdict-title">D1 定性强度：${pass ? '通过' : '触发风险'}</div>
        <div class="verdict-desc">
          红色词共出现 <strong>${total}</strong> 次。
          判断标准：≤ 2次 → 通过，> 2次 → 触发风险。
          ${total === 0 ? '回答完全未使用定性负面词汇。' :
            pass ? '红色词使用在合理范围内，未过度定性。' :
            total <= 4 ? '红色词偏多，回答倾向强化负面印象，建议复核。' :
            '红色词过多，AI对平台做出了强定性负面判断。'}
        </div>
      </div>
    </div>
  `;

  // ── Score ──
  const scoreEl = document.getElementById('score-num');
  scoreEl.textContent = total;
  scoreEl.className = 'score-num ' + level;
  document.getElementById('score-label').textContent =
    total === 0 ? '零触发' : total <= 2 ? '低触发' : total <= 4 ? '中度触发' : '高度触发';
  document.getElementById('score-sublabel').textContent = '次红色词出现';

  // ── Word grid ──
  const grid = document.getElementById('word-grid');
  grid.innerHTML = Object.entries(counts).map(([word, count]) => `
    <div class="word-card ${count > 0 ? 'hit' : ''}">
      <div class="word-card-name">${word}</div>
      <div class="word-card-count">${count}</div>
      <div class="word-card-sub">${count > 0 ? '次' : '未出现'}</div>
    </div>
  `).join('');

  // ── Contexts (sentences containing red words) ──
  const contextsEl = document.getElementById('contexts');
  const contextLabel = document.getElementById('context-label');
  const sentences = text.split(/(?<=[.!?。！？\n])\s*/);
  const found = [];

  for (const sentence of sentences) {
    const s = sentence.trim();
    if (!s) continue;
    for (const word of words) {
      const regex = buildRegex(word);
      if (regex.test(s)) {
        found.push({ word, sentence: s });
        break;
      }
    }
  }

  if (found.length > 0) {
    contextLabel.style.display = '';
    contextsEl.innerHTML = found.map(({ word, sentence }) => {
      const ctxPattern = words.map(w => {
        const esc = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return '\\b' + esc + '\\w*\\b';
      }).join('|');
      const highlighted = sentence.replace(new RegExp(ctxPattern, 'gi'), m => `<mark>${m}</mark>`);
      return `
        <div class="context-item">
          <span class="context-tag">${word}</span>
          <span class="context-sentence">${highlighted}</span>
        </div>
      `;
    }).join('');
  } else {
    contextLabel.style.display = 'none';
    contextsEl.innerHTML = '';
  }

  // ── Full text highlight ──
  let highlighted = escapeHtml(text);
  // Build combined regex from current word list
  const combinedPattern = words.map(w => {
    const escaped = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return '\\b' + escaped + '\\w*\\b';
  }).join('|');
  const combined = new RegExp(combinedPattern, 'gi');
  highlighted = highlighted.replace(combined, m => `<mark>${m}</mark>`);
  document.getElementById('highlight-body').innerHTML = highlighted;

  // Show results
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function reset() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('input-text').value = '';
  document.getElementById('char-count').textContent = '0 字符';
  document.getElementById('analyze-btn').disabled = true;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
document.getElementById('analyze-btn').disabled = true;
</script>
</body>
</html>
