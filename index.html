<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Word Analyzer · AI Benchmark</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0D0F14;
    --surface: #151820;
    --surface2: #1C2030;
    --border: #252A3A;
    --orange: #FF6600;
    --orange-dim: rgba(255,102,0,0.12);
    --red: #FF3B3B;
    --red-dim: rgba(255,59,59,0.12);
    --yellow: #FFB800;
    --green: #00D48A;
    --text: #E8EAF0;
    --muted: #5A6178;
    --highlight-bg: rgba(255,59,59,0.2);
    --highlight-border: #FF3B3B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── API Key box ── */
  .apikey-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .apikey-box.saved {
    border-color: rgba(0,212,138,0.3);
    background: rgba(0,212,138,0.05);
  }
  .apikey-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .apikey-link {
    color: var(--orange);
    text-decoration: none;
    margin-left: auto;
    font-size: 11px;
  }
  .apikey-link:hover { text-decoration: underline; }
  .apikey-row {
    display: flex; gap: 10px;
  }
  #apikey-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  #apikey-input:focus { border-color: var(--orange); }
  #apikey-input.valid { border-color: var(--green); }
  .apikey-save-btn {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .apikey-save-btn:hover { background: #FF7A20; }
  .apikey-hint {
    margin-top: 8px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    min-height: 16px;
  }
  .apikey-hint.ok  { color: var(--green); }
  .apikey-hint.err { color: var(--red); }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  header {
    margin-bottom: 48px;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 20px; height: 2px;
    background: var(--orange);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--red); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    max-width: 520px;
  }

  /* ── Red word chips ── */
  .word-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 20px;
  }
  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--red-dim);
    border: 1px solid rgba(255,59,59,0.3);
    color: #FF7A7A;
  }

  /* ── Upload zone ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--orange);
    background: var(--orange-dim);
  }
  .upload-zone.drag-over { transform: scale(1.01); }

  .upload-icon {
    width: 56px; height: 56px;
    margin: 0 auto 16px;
    border-radius: 12px;
    background: var(--orange-dim);
    border: 1px solid rgba(255,102,0,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  .upload-label {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .upload-sub {
    font-size: 13px;
    color: var(--muted);
  }
  .upload-sub span {
    color: var(--orange);
    font-weight: 500;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  #file-input { display: none; }

  /* ── Preview ── */
  .preview-box {
    display: none;
    margin-top: 20px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative;
  }
  .preview-box img {
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    display: block;
    background: #0a0a0a;
  }
  .preview-label {
    padding: 10px 16px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .remove-btn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 12px; font-family: 'DM Mono', monospace;
    padding: 2px 6px; border-radius: 4px;
    transition: all 0.15s;
  }
  .remove-btn:hover { color: var(--red); background: var(--red-dim); }

  /* ── Analyze button ── */
  .analyze-btn {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: var(--orange);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .analyze-btn:hover:not(:disabled) {
    background: #FF7A20;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(255,102,0,0.35);
  }
  .analyze-btn:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none;
  }

  /* ── Loading ── */
  .loading-state {
    display: none;
    margin-top: 32px;
    padding: 24px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    text-align: center;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 13px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── Results ── */
  .results {
    display: none;
    margin-top: 32px;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Score card */
  .score-card {
    border-radius: 16px;
    padding: 28px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 28px;
  }
  .score-number {
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    min-width: 100px;
    text-align: center;
  }
  .score-number.pass  { color: var(--green); }
  .score-number.warn  { color: var(--yellow); }
  .score-number.fail  { color: var(--red); }

  .score-meta { flex: 1; }
  .score-verdict {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 700;
    margin-bottom: 6px;
  }
  .score-verdict.pass { color: var(--green); }
  .score-verdict.warn { color: var(--yellow); }
  .score-verdict.fail { color: var(--red); }

  .score-desc {
    font-size: 13px; color: var(--muted); line-height: 1.5;
  }

  .score-badge {
    padding: 6px 14px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 500;
    white-space: nowrap;
  }
  .score-badge.pass { background: rgba(0,212,138,0.12); color: var(--green); border: 1px solid rgba(0,212,138,0.3); }
  .score-badge.warn { background: rgba(255,184,0,0.12); color: var(--yellow); border: 1px solid rgba(255,184,0,0.3); }
  .score-badge.fail { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,59,59,0.3); }

  /* Word breakdown */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .word-item {
    border-radius: 10px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .word-item.found {
    background: var(--red-dim);
    border-color: rgba(255,59,59,0.4);
  }
  .word-item.found:hover { border-color: var(--red); }

  .word-item-name {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .word-item.found .word-item-name { color: #FF7A7A; }

  .word-item-count {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
  }
  .word-item.found .word-item-count { color: var(--red); }
  .word-item:not(.found) .word-item-count { color: var(--muted); }

  .word-item-label {
    font-size: 10px; color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  /* Context quotes */
  .quotes-box {
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .quotes-header {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .quote-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.6;
    color: #9AA3B8;
  }
  .quote-item:last-child { border-bottom: none; }
  .quote-item mark {
    background: rgba(255,59,59,0.25);
    color: #FF7A7A;
    border-radius: 3px;
    padding: 1px 3px;
    font-weight: 600;
  }
  .quote-source {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* D1 verdict */
  .d1-verdict {
    border-radius: 12px;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px;
  }
  .d1-verdict.pass { background: rgba(0,212,138,0.08); border: 1px solid rgba(0,212,138,0.2); }
  .d1-verdict.fail { background: var(--red-dim); border: 1px solid rgba(255,59,59,0.3); }

  .d1-icon { font-size: 24px; }
  .d1-text { font-size: 14px; line-height: 1.5; }
  .d1-text strong { font-family: 'Syne', sans-serif; display: block; margin-bottom: 2px; }

  /* Error state */
  .error-box {
    display: none;
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 10px;
    background: var(--red-dim);
    border: 1px solid rgba(255,59,59,0.3);
    color: #FF7A7A;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  /* Divider */
  hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

  /* Responsive */
  @media (max-width: 600px) {
    .score-card { flex-direction: column; text-align: center; }
    .score-number { font-size: 56px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="eyebrow">AI Narrative Benchmark · D1维度工具</div>
    <h1>Red Word<br><span>Analyzer</span></h1>
    <p class="subtitle">上传AI回答截图，自动识别并统计红色词出现次数，输出D1维度评分。</p>
    <div class="word-chips">
      <span class="chip">dangerous</span>
      <span class="chip">toxic</span>
      <span class="chip">unsafe</span>
      <span class="chip">avoid</span>
      <span class="chip">risk</span>
      <span class="chip">harmful</span>
      <span class="chip">failed</span>
      <span class="chip">warning</span>
    </div>
  </header>

  <!-- API Key input -->
  <div class="apikey-box" id="apikey-box">
    <div class="apikey-label">
      <span>🔑</span>
      <span>Anthropic API Key</span>
      <a href="https://console.anthropic.com/settings/keys" target="_blank" class="apikey-link">获取 Key →</a>
    </div>
    <div class="apikey-row">
      <input type="password" id="apikey-input" placeholder="sk-ant-..." spellcheck="false" autocomplete="off">
      <button class="apikey-save-btn" onclick="saveApiKey()">保存</button>
    </div>
    <div class="apikey-hint" id="apikey-hint"></div>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="image/*">
    <div class="upload-icon">📸</div>
    <div class="upload-label">拖拽截图到这里</div>
    <div class="upload-sub">或者 <span onclick="document.getElementById('file-input').click()">点击选择文件</span> · PNG / JPG / WebP</div>
  </div>

  <div class="preview-box" id="preview-box">
    <img id="preview-img" src="" alt="preview">
    <div class="preview-label">
      <span id="preview-filename">screenshot.png</span>
      <button class="remove-btn" onclick="removeImage()">✕ 移除</button>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>

  <button class="analyze-btn" id="analyze-btn" disabled onclick="analyze()">
    <span>🔍</span> 开始分析
  </button>

  <!-- Loading -->
  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    <div class="loading-text">正在识别图片文字并统计红色词…</div>
  </div>

  <!-- Results -->
  <div class="results" id="results">

    <div class="section-title">D1 维度判定</div>
    <div id="d1-verdict-box"></div>

    <div class="section-title">红色词统计</div>
    <div class="word-grid" id="word-grid"></div>

    <div class="section-title">上下文摘录</div>
    <div class="quotes-box" id="quotes-box">
      <div class="quotes-header">找到红色词的句子</div>
      <div id="quotes-list"></div>
    </div>

    <div class="section-title">总分卡</div>
    <div class="score-card" id="score-card"></div>

  </div>

</div>

<script>
const RED_WORDS = ['dangerous','toxic','unsafe','avoid','risk','harmful','failed','warning'];
let imageBase64 = null;
let imageType = null;

// ── API Key management ─────────────────────────────────────
function getApiKey() {
  return localStorage.getItem('anthropic_api_key') || '';
}

function saveApiKey() {
  const input = document.getElementById('apikey-input');
  const key = input.value.trim();
  const hint = document.getElementById('apikey-hint');
  const box = document.getElementById('apikey-box');

  if (!key.startsWith('sk-ant-')) {
    hint.textContent = '⚠ Key 格式不对，应以 sk-ant- 开头';
    hint.className = 'apikey-hint err';
    return;
  }
  localStorage.setItem('anthropic_api_key', key);
  input.className = 'valid';
  box.classList.add('saved');
  hint.textContent = '✓ 已保存到本地，下次打开自动填入';
  hint.className = 'apikey-hint ok';
  // Mask display
  input.value = key.slice(0, 14) + '•'.repeat(20) + key.slice(-4);
}

function loadSavedKey() {
  const key = getApiKey();
  if (!key) return;
  const input = document.getElementById('apikey-input');
  const hint = document.getElementById('apikey-hint');
  const box = document.getElementById('apikey-box');
  input.value = key.slice(0, 14) + '•'.repeat(20) + key.slice(-4);
  input.className = 'valid';
  box.classList.add('saved');
  hint.textContent = '✓ 已读取本地保存的 Key';
  hint.className = 'apikey-hint ok';
}

// Load on startup
document.addEventListener('DOMContentLoaded', loadSavedKey);

// Allow re-edit on click
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('apikey-input');
  input.addEventListener('focus', () => {
    const key = getApiKey();
    if (key) input.value = key;
  });
  input.addEventListener('blur', () => {
    const key = getApiKey();
    if (key && input.value === key) {
      input.value = key.slice(0, 14) + '•'.repeat(20) + key.slice(-4);
    }
  });
});

// ── Drag & drop ────────────────────────────────────────────
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
});
zone.addEventListener('click', () => document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    imageBase64 = dataUrl.split(',')[1];
    imageType = file.type;

    document.getElementById('preview-img').src = dataUrl;
    document.getElementById('preview-filename').textContent = file.name;
    document.getElementById('preview-box').style.display = 'block';
    document.getElementById('analyze-btn').disabled = false;
    hideResults();
    hideError();
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  imageBase64 = null; imageType = null;
  document.getElementById('preview-box').style.display = 'none';
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('file-input').value = '';
  hideResults(); hideError();
}

function hideResults() { document.getElementById('results').style.display = 'none'; }
function hideError()   { document.getElementById('error-box').style.display = 'none'; }

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}

// ── Main analyze ───────────────────────────────────────────
async function analyze() {
  if (!imageBase64) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    showError('请先填写并保存 Anthropic API Key');
    document.getElementById('apikey-input').focus();
    return;
  }

  hideResults(); hideError();
  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('analyze-btn').disabled = true;

  const prompt = `You are analyzing an AI chatbot's response screenshot for a PR benchmark.

Your task:
1. Extract ALL visible text from this screenshot (it's a screenshot of an AI assistant's reply)
2. Count exact occurrences of each of these red words (case-insensitive, count each word form: risk/risks/risky all count as "risk"; avoid/avoiding/avoidance count as "avoid"; etc.):
   - dangerous (includes: dangerous, danger, dangers)
   - toxic (includes: toxic, toxicity, toxin, toxins)
   - unsafe (includes: unsafe)
   - avoid (includes: avoid, avoiding, avoidance, avoidable)
   - risk (includes: risk, risks, risky, at-risk)
   - harmful (includes: harmful, harm, harms)
   - failed (includes: failed, fail, fails, failure, failures)
   - warning (includes: warning, warnings, warn, warns)

3. For each red word found (count > 0), extract the EXACT sentence or bullet point containing it (max 120 chars, use "..." to truncate).

Return ONLY valid JSON, no markdown, no explanation:
{
  "extracted_text_preview": "first 200 chars of extracted text",
  "counts": {
    "dangerous": 0,
    "toxic": 0,
    "unsafe": 0,
    "avoid": 0,
    "risk": 0,
    "harmful": 0,
    "failed": 0,
    "warning": 0
  },
  "total": 0,
  "contexts": [
    {"word": "risk", "sentence": "...sentence containing the word..."}
  ]
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": getApiKey(),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: imageType, data: imageBase64 }
            },
            { type: "text", text: prompt }
          ]
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const raw = data.content.find(b => b.type === 'text')?.text || '';

    // Strip markdown fences if any
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    document.getElementById('loading-state').style.display = 'none';
    renderResults(result);

  } catch (err) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('analyze-btn').disabled = false;
    showError(err.message || '分析失败，请重试');
  }
}

// ── Render results ─────────────────────────────────────────
function renderResults(data) {
  const total = data.total || Object.values(data.counts).reduce((a,b) => a+b, 0);
  const pass = total <= 2;
  const level = total === 0 ? 'pass' : total <= 2 ? 'pass' : total <= 4 ? 'warn' : 'fail';

  // D1 verdict
  const verdictBox = document.getElementById('d1-verdict-box');
  verdictBox.innerHTML = `
    <div class="d1-verdict ${pass ? 'pass' : 'fail'}">
      <div class="d1-icon">${pass ? '✅' : '❌'}</div>
      <div class="d1-text">
        <strong>D1 定性强度：${pass ? '通过' : '触发风险'}</strong>
        红色词共出现 <strong>${total}</strong> 次。判断标准：≤2次为通过，>2次为触发风险。
      </div>
    </div>
  `;

  // Word grid
  const grid = document.getElementById('word-grid');
  grid.innerHTML = RED_WORDS.map(word => {
    const count = data.counts[word] || 0;
    const found = count > 0;
    return `
      <div class="word-item ${found ? 'found' : ''}">
        <div class="word-item-name">${word}</div>
        <div class="word-item-count">${count}</div>
        <div class="word-item-label">${found ? '次出现' : '未出现'}</div>
      </div>
    `;
  }).join('');

  // Contexts
  const quotesList = document.getElementById('quotes-list');
  const contexts = data.contexts || [];
  if (contexts.length === 0) {
    quotesList.innerHTML = `<div class="quote-item" style="color:var(--muted)">未找到红色词</div>`;
  } else {
    quotesList.innerHTML = contexts.map(ctx => {
      const highlighted = ctx.sentence.replace(
        new RegExp(`\\b(${RED_WORDS.join('|')}\\w*)\\b`, 'gi'),
        m => `<mark>${m}</mark>`
      );
      return `
        <div class="quote-item">
          ${highlighted}
          <div class="quote-source">↑ 含「${ctx.word}」</div>
        </div>
      `;
    }).join('');
  }

  // Score card
  const scoreCard = document.getElementById('score-card');
  const verdictText = level === 'pass' ? '定性强度正常' : level === 'warn' ? '定性偏强，需关注' : '定性过强，触发风险';
  const verdictDesc = level === 'pass'
    ? '红色词使用在合理范围内，AI回答未过度定性平台的安全问题。'
    : level === 'warn'
    ? '红色词出现次数偏多，回答倾向于强化负面印象，建议复核。'
    : '红色词出现次数过多，AI回答做出了强定性负面判断，D1维度标记为❌触发风险。';

  scoreCard.innerHTML = `
    <div class="score-number ${level}">${total}</div>
    <div class="score-meta">
      <div class="score-verdict ${level}">${verdictText}</div>
      <div class="score-desc">${verdictDesc}</div>
    </div>
    <div class="score-badge ${level}">${level === 'pass' ? '✅ D1 通过' : '❌ D1 触发'}</div>
  `;

  document.getElementById('results').style.display = 'block';
  document.getElementById('analyze-btn').disabled = false;
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
